# Integralayer Mainnet Validator (Docker)
#
# Usage:  docker compose -f templates/docker/docker-compose.mainnet.yml up -d
#   (or from repo root: docker compose -f docker-compose.mainnet.yml up -d)
#
# Custom moniker: MONIKER=mynode docker compose -f ... up -d
# Rebuild after git pull: docker compose -f ... build --no-cache && docker compose -f ... up -d
# Requires: Docker 20.10+ with Compose V2 (docker compose, NOT docker-compose)

services:
  integra-node:
    build: .
    container_name: integra-mainnet
    environment:
      - CHAIN_ID=integra-1
      - MONIKER=${MONIKER:-my-integra-validator}
      - MIN_GAS_PRICES=${MIN_GAS_PRICES:-0airl}
      - STATE_SYNC=${STATE_SYNC:-true}
    ports:
      - "26656:26656"  # P2P
      - "26657:26657"  # RPC
      - "8545:8545"    # EVM JSON-RPC
      - "8546:8546"    # EVM WebSocket
      - "1317:1317"    # REST API
    volumes:
      - integra-mainnet-data:/root/.intgd
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:26657/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"

volumes:
  integra-mainnet-data:
    driver: local
